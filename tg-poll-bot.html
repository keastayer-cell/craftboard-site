<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Poll Bot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f13;
      color: #e2e2e2;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 60px 20px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 40px;
      transition: color 0.15s;
    }
    .back:hover { color: #a78bfa; }

    /* Rendered markdown */
    .md-body h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }

    .md-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f0f0;
      margin-top: 40px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1f1f2e;
    }

    .md-body h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #d1d5db;
      margin-top: 24px;
      margin-bottom: 10px;
    }

    .md-body p {
      font-size: 0.93rem;
      color: #9ca3af;
      line-height: 1.75;
      margin-bottom: 12px;
    }

    .md-body ul, .md-body ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .md-body li {
      font-size: 0.93rem;
      color: #9ca3af;
      line-height: 1.75;
    }

    .md-body li strong, .md-body p strong {
      color: #e2e2e2;
      font-weight: 600;
    }

    .md-body em {
      color: #c4b5fd;
      font-style: italic;
    }

    .md-body a {
      color: #60a5fa;
      text-decoration: none;
    }
    .md-body a:hover { text-decoration: underline; }

    .md-body code {
      background: #1a1a28;
      color: #a5f3fc;
      padding: 2px 7px;
      border-radius: 5px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.82em;
    }

    .md-body pre {
      background: #12121a;
      border: 1px solid #1f1f2e;
      border-radius: 10px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 14px 0;
    }

    .md-body pre code {
      background: none;
      padding: 0;
      color: #a5f3fc;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .md-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      margin: 14px 0;
    }

    .md-body th {
      text-align: left;
      color: #6b7280;
      font-weight: 500;
      padding: 8px 12px;
      border-bottom: 1px solid #1f1f2e;
    }

    .md-body td {
      padding: 9px 12px;
      color: #9ca3af;
      border-bottom: 1px solid #1a1a28;
    }

    .md-body tr:last-child td { border-bottom: none; }

    .md-body td:first-child {
      color: #e2e2e2;
      font-weight: 500;
    }

    .md-body hr {
      border: none;
      border-top: 1px solid #1f1f2e;
      margin: 32px 0;
    }

    .loading {
      color: #4b5563;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    footer {
      text-align: center;
      margin-top: 80px;
      color: #374151;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="index.html">← CraftBoard</a>
    <div class="md-body" id="content">
      <p class="loading">Загрузка...</p>
    </div>
  </div>
  <footer>&copy; 2026</footer>

  <script>
    fetch('README.md', {cache: 'no-store'})
      .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.text();
      })
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        const h1 = document.querySelector('.md-body h1');
        if (h1) document.title = h1.textContent;
      })
      .catch(() => {
        document.getElementById('content').innerHTML =
          '<p style="color:#f87171">Не удалось загрузить README.md</p>';
      });
  </script>
</body>
</html>
